<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minigame vòng quay may mắn</title>
    <link rel="stylesheet" href="style_vongquay.css">
</head>
<body>
    <div class="wheel-container">
        <nav class="game-nav">
            <a href="index.html" class="nav-item">🎲 Xúc Xắc</a>
            <a href="vongquay.html" class="nav-item active">🎡 Vòng Quay</a>
        </nav>

        <header>
            <h1>LALAB0Y - EVENT THÁNG</h1>
            <div class="event-tag"> VÒNG QUAY MAY MẮN - 20H THỨ 7 TUẦN CUỐI THÁNG </div>
            <img src="img/logoBang.png">
        </header>

        <div class="input-section card-fancy">
            <input type="text" id="username" placeholder="Nhập tên Ingame chính xác để quay...">
        </div>

        <div class="main-layout">
            <div class="wheel-side">
                <div class="wheel-wrapper">
                    <div class="pointer"></div>
                    <canvas id="wheelCanvas" width="500" height="500"></canvas>
                </div>
                <button id="spin-btn">QUAY NGAY</button>
                <h2 id="result-text">Chúc bạn may mắn!</h2>
            </div>

            <div class="info-side">
                <div class="card-fancy">
                    <h3>🎁 PHẦN THƯỞNG</h3>
                    <ul id="prize-list-display">
                        </ul>
                </div>

                <div class="card-fancy history-section">
                    <div class="history-header">
                        <h3>🏆 LỊCH SỬ NHẬN THƯỞNG</h3>
                        <span class="admin-hint">Nhấn 'A' để quản lý</span>
                    </div>
                    <div class="table-container">
                        <table class="ranking-table">
                            <thead>
                                <tr>
                                    <th>Thời gian</th>
                                    <th>Nhân vật</th>
                                    <th>Vật phẩm</th>
                                </tr>
                            </thead>
                            <tbody id="history-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="admin-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content card-fancy">
            <h3>QUẢN TRỊ VIÊN</h3>
            <p>Xác nhận reset toàn bộ lịch sử và lượt quay tuần mới?</p>
            <div class="modal-btns">
                <button id="confirm-reset" class="btn-danger">XÁC NHẬN RESET</button>
                <button id="close-modal">HỦY</button>
            </div>
        </div>
    </div>

    <script src="script_vongquay.js"></script>
</body>
</html>
